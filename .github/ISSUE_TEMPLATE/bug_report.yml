name: Bug Report
description: Report a bug or issue with Skillful
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.

        Before submitting, please:
        - Search existing issues to avoid duplicates
        - Confirm you are testing against a current release or a recent build from `master`

  - type: checkboxes
    id: prior-search
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched the [existing issues](https://github.com/Mastermindzh/skillful/issues) and my issue has not already been reported
          required: true
        - label: I have verified this on a current release or a recent build from `master`
          required: true

  - type: dropdown
    id: installation-method
    attributes:
      label: Installation Method
      description: How did you run Skillful?
      options:
        - GitHub release build
        - Development build from source
        - Packaged test build
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      description: What operating system version are you using?
      placeholder: e.g. Ubuntu 24.04, macOS 15.4, Windows 11 24H2
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: Skillful Version
      description: What version of Skillful are you using?
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: Current Behavior
      description: What actually happens?
      placeholder: A clear and concise description of the bug...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: A clear and concise description of the expected behavior...
    validations:
      required: false

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Please provide clear, numbered steps to reproduce the issue
      placeholder: |
        1. Open Skillful
        2. Create or select a collection
        3. Open '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: screenshots-logs
    attributes:
      label: Screenshots and Logs
      description: If applicable, add screenshots or paste any relevant logs here
      placeholder: Paste logs or drag screenshots here...
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
      placeholder: Any additional information that might be helpful...
    validations:
      required: false
